<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการพัสดุธรรมชาติ - Inventory Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; }
    </style>
</head>
<body class="bg-stone-100 min-h-screen p-4 md:p-8 text-stone-800">

    <div class="max-w-7xl mx-auto bg-stone-50 rounded-2xl shadow-xl shadow-stone-200/50 border border-emerald-100 overflow-hidden">
        
        <div class="p-6 text-black flex flex-col sm:flex-row items-center justify-between shadow-md">
            <div class="flex items-center space-x-3 mb-4 sm:mb-0">
                <span class="text-3xl">🌿</span>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold tracking-wide">ระบบจัดการพัสดุและคลังสินค้า</h1>
                    <p class="text-emerald-800 text-xs md:text-sm">Nature-Oriented Inventory Management</p>
                </div>
            </div>
        </div>
        
        <div class="p-6">
            <div id="loading" class="text-center py-12 flex flex-col items-center justify-center space-y-3">
                <div class="animate-spin rounded-full h-10 w-10 border-4 border-emerald-500 border-t-transparent"></div>
                <p class="text-emerald-700 font-medium">กำลังโหลดข้อมูล... (Loading)</p>
            </div>

            <div class="overflow-x-auto hidden rounded-xl border border-stone-200 bg-white" id="table-container">
                <table class="min-w-full divide-y divide-stone-200">
                    <thead class="bg-emerald-50">
                        <tr>
                            <th class="py-3.5 px-4 text-left text-xs font-semibold text-emerald-900 tracking-wider">รหัสพัสดุ</th>
                            <th class="py-3.5 px-4 text-left text-xs font-semibold text-emerald-900 tracking-wider">วันที่รับเข้า</th>
                            <th class="py-3.5 px-4 text-left text-xs font-semibold text-emerald-900 tracking-wider">ประเภท</th>
                            <th class="py-3.5 px-4 text-left text-xs font-semibold text-emerald-900 tracking-wider">รายการพัสดุ</th>
                            <th class="py-3.5 px-4 text-left text-xs font-semibold text-emerald-900 tracking-wider">สถานะปัจจุบัน / ผู้ยืม</th>
                            <th class="py-3.5 px-4 text-left text-xs font-semibold text-emerald-900 tracking-wider">จำนวนคงเหลือ</th>
                            <th class="py-3.5 px-4 text-center text-xs font-semibold text-emerald-900 tracking-wider">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-stone-100 text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwNz1QfJW-dF2STVyN-dpoGH-1z3kzV2f9v6D_GzM9nyOgSJcUVA9o0YpTpDgHUVCgXZw/exec';

        const loadingDiv = document.getElementById('loading');
        const tableContainer = document.getElementById('table-container');
        const tableBody = document.getElementById('table-body');

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                renderTable(data);
            } catch (error) {
                console.error('Error:', error);
                loadingDiv.innerHTML = '<span class="text-amber-700 font-medium">❌ เกิดข้อผิดพลาดในการเชื่อมต่อผืนป่าข้อมูล</span>';
            }
        }

        function renderTable(data) {
            loadingDiv.classList.add('hidden');
            tableContainer.classList.remove('hidden');
            tableBody.innerHTML = '';

            data.forEach((item) => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-stone-50/80 transition duration-150';

                const isBorrowed = item.status === 'ถูกยืม';

                tr.innerHTML = `
                    <td class="py-4 px-4 font-mono font-medium text-stone-600 bg-stone-50/40">${item.id}</td>
                    <td class="py-4 px-4 text-stone-500">${item.date}</td>
                    <td class="py-4 px-4"><span class="px-2.5 py-1 text-xs font-medium rounded-full bg-stone-200/60 text-stone-700">${item.type}</span></td>
                    <td class="py-4 px-4 font-medium text-stone-900">${item.name}</td>
                    <td class="py-4 px-4">
                        <div class="flex flex-col space-y-2">
                            <select id="status-${item.rowNumber}" onchange="toggleBorrowerInput(${item.rowNumber})" 
                                class="border border-stone-200 bg-stone-50 rounded-lg p-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white text-stone-700 font-medium">
                                <option value="ไม่ถูกยืม" ${item.status === 'ไม่ถูกยืม' ? 'selected' : ''}>🟢 ไม่ถูกยืม (Available)</option>
                                <option value="ถูกยืม" ${item.status === 'ถูกยืม' ? 'selected' : ''}>🔴 ถูกยืม (Borrowed)</option>
                            </select>
                            
                            <input type="text" id="borrower-${item.rowNumber}" value="${item.borrower || ''}" 
                                placeholder="ระบุชื่อผู้ยืม..." 
                                class="${isBorrowed ? '' : 'hidden'} border border-stone-200 rounded-lg p-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-emerald-500">
                            
                            ${item.borrowDate ? `<span class="text-[11px] text-stone-400">ยืมเมื่อ: ${item.borrowDate}</span>` : ''}
                        </div>
                    </td>
                    <td class="py-4 px-4">
                        <input type="number" id="qty-${item.rowNumber}" value="${item.quantity}" min="0" 
                            class="border border-stone-200 bg-stone-50 rounded-lg p-1.5 w-24 text-center font-semibold focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white text-stone-800">
                    </td>
                    <td class="py-4 px-4 text-center">
                        <button onclick="updateRow(${item.rowNumber})" 
                            class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-1.5 px-4 rounded-xl shadow-sm hover:shadow-md transition duration-150 text-xs tracking-wider">
                            บันทึก (Save)
                        </button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        function toggleBorrowerInput(rowNumber) {
            const statusValue = document.getElementById(`status-${rowNumber}`).value;
            const borrowerInput = document.getElementById(`borrower-${rowNumber}`);
            if (statusValue === 'ถูกยืม') {
                borrowerInput.classList.remove('hidden');
                borrowerInput.focus();
            } else {
                borrowerInput.classList.add('hidden');
                borrowerInput.value = '';
            }
        }

        async function updateRow(rowNumber) {
            const statusSelect = document.getElementById(`status-${rowNumber}`).value;
            const qtyInput = document.getElementById(`qty-${rowNumber}`).value;
            const borrowerInput = document.getElementById(`borrower-${rowNumber}`).value;
            
            if (statusSelect === 'ถูกยืม' && !borrowerInput.trim()) {
                alert('🍁 กรุณาระบุชื่อผู้ยืมเมื่อเลือกสถานะถูกยืม');
                return;
            }

            if (qtyInput < 0 || !Number.isInteger(Number(qtyInput))) {
                alert('กรุณากรอกจำนวนคงเหลือเป็นจำนวนเต็มบวก');
                return;
            }

            const payload = {
                rowNumber: rowNumber,
                status: statusSelect,
                quantity: parseInt(qtyInput),
                borrower: statusSelect === 'ถูกยืม' ? borrowerInput : ''
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                if(result.success) {
                    alert(`🍃 บันทึกข้อมูลและปรับปรุงสถานะแถวที่ ${rowNumber} สำเร็จ!`);
                    fetchData();
                }
            } catch (error) {
                console.error('Error:', error);
                alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล');
            }
        }

        fetchData();
    </script>
</body>
</html>
